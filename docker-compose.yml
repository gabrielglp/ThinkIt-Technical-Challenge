services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: orders_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - orders_network

  # ─── FastAPI backend ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orders_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CORS_ORIGINS: ${CORS_ORIGINS}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./orders.csv:/app/data/orders.csv:ro
    networks:
      - orders_network

  # ─── ETL (one-shot, roda separado) ───────────────────────────
  etl:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orders_etl
    env_file: .env
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
    command: ["python", "-m", "etl.load_orders", "/app/data/orders.csv"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./orders.csv:/app/data/orders.csv:ro
    networks:
      - orders_network
    profiles:
      - etl

  # ─── Next.js frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: orders_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - orders_network

volumes:
  postgres_data:

networks:
  orders_network:
    driver: bridge
